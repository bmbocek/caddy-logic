<!DOCTYPE html>
<html><head><title>CL Icons</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h2>Caddy Logic Icons</h2>
<canvas id="c192" width="192" height="192" style="border:1px solid #333;margin:10px"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #333;margin:10px"></canvas><br>
<button onclick="dl('c192','icon-192.png')" style="padding:10px 20px;margin:10px;font-size:14px">Download 192</button>
<button onclick="dl('c512','icon-512.png')" style="padding:10px 20px;margin:10px;font-size:14px">Download 512</button>
<script>
function draw(id,s){
  const c=document.getElementById(id),x=c.getContext('2d');
  x.fillStyle='#000';x.fillRect(0,0,s,s);
  const g=x.createLinearGradient(s*.2,0,s*.8,s);
  g.addColorStop(0,'#A06030');g.addColorStop(.3,'#E8A878');g.addColorStop(.5,'#D4845A');g.addColorStop(.7,'#EEBB90');g.addColorStop(1,'#A06030');
  const pad=s*.08,bx=pad,by=pad,bw=s-pad*2,bh=s-pad*2;
  x.strokeStyle='#D4845A';x.lineWidth=s*.02;x.strokeRect(bx,by,bw,bh);
  x.fillStyle=g;x.textAlign='center';x.textBaseline='middle';
  x.font=`700 ${s*.19}px -apple-system,"SF Pro Display","Helvetica Neue",sans-serif`;
  x.fillText('CADDY',s/2,s/2-s*.1);
  x.fillText('LOGIC',s/2,s/2+s*.1);
}
draw('c192',192);draw('c512',512);
function dl(id,n){const c=document.getElementById(id),a=document.createElement('a');a.download=n;a.href=c.toDataURL('image/png');a.click();}
</script></body></html>
