<!DOCTYPE html>
<html>
<head><title>Caddy Logic Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h2>Caddy Logic Icon Generator</h2>
<p>Click each button to download the icon.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #333;margin:10px"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #333;margin:10px"></canvas>
<br>
<button onclick="dl('c192','icon-192.png')" style="padding:10px 20px;margin:10px;font-size:14px">Download 192x192</button>
<button onclick="dl('c512','icon-512.png')" style="padding:10px 20px;margin:10px;font-size:14px">Download 512x512</button>
<script>
function draw(id, s) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  // Black background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, s, s);
  
  // Copper gradient for text
  const grad = ctx.createLinearGradient(s*0.2, 0, s*0.8, s);
  grad.addColorStop(0, '#A06030');
  grad.addColorStop(0.3, '#E8A878');
  grad.addColorStop(0.5, '#D4845A');
  grad.addColorStop(0.7, '#EEBB90');
  grad.addColorStop(1, '#A06030');
  
  // Border rectangle (bib)
  const bx = s * 0.12, by = s * 0.35, bw = s * 0.76, bh = s * 0.3;
  ctx.strokeStyle = '#D4845A';
  ctx.lineWidth = s * 0.012;
  ctx.strokeRect(bx, by, bw, bh);
  
  // "CADDY" text
  ctx.fillStyle = grad;
  ctx.font = `600 ${s*0.1}px -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif`;
  ctx.textAlign = 'center';
  ctx.letterSpacing = `${s*0.012}px`;
  ctx.fillText('CADDY', s/2, by + bh*0.45);
  
  // "LOGIC" text
  ctx.fillText('LOGIC', s/2, by + bh*0.82);
  
  // Tagline below
  ctx.fillStyle = '#555';
  ctx.font = `italic ${s*0.045}px Georgia, serif`;
  ctx.fillText('Know the play. Make the call.', s/2, by + bh + s*0.1);
}

draw('c192', 192);
draw('c512', 512);

function dl(id, name) {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.download = name;
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
